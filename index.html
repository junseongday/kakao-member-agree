<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>카카오 앱 동의</title>
  <style>
    body { font-family: -apple-system, sans-serif; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; background: #f5f5f5; }
    .card { background: #fff; border-radius: 16px; padding: 48px; text-align: center; box-shadow: 0 2px 12px rgba(0,0,0,0.08); max-width: 440px; }
    .icon { font-size: 64px; margin-bottom: 16px; }
    h1 { font-size: 22px; color: #333; margin: 0 0 12px; }
    p { font-size: 15px; color: #666; margin: 0; line-height: 1.6; }
    .code-box { margin-top: 20px; padding: 14px; background: #f0f0f0; border-radius: 8px; font-family: monospace; font-size: 13px; word-break: break-all; user-select: all; color: #333; }
    .copy-btn { margin-top: 12px; padding: 10px 24px; background: #FEE500; border: none; border-radius: 8px; font-size: 15px; font-weight: bold; cursor: pointer; }
    .copy-btn:active { background: #e6cf00; }
    .hint { margin-top: 12px; font-size: 13px; color: #999; }
  </style>
</head>
<body>
  <div class="card" id="card">
    <div class="icon">&#x2705;</div>
    <h1>앱 동의가 완료되었습니다</h1>
    <p>아래 인증코드를 관리자에게 전달해주세요.</p>
    <div class="code-box" id="code">-</div>
    <button class="copy-btn" onclick="copyCode()">코드 복사</button>
    <p class="hint" id="hint"></p>
  </div>
  <script>
    var params = new URLSearchParams(location.search);
    var code = params.get('code');

    if (!code) {
      document.getElementById('code').parentElement.querySelector('p').textContent = '공유받은 동의 링크를 통해 접속해주세요.';
      document.getElementById('code').style.display = 'none';
      document.querySelector('.copy-btn').style.display = 'none';
    } else {
      document.getElementById('code').textContent = code;
    }

    function copyCode() {
      navigator.clipboard.writeText(code).then(function() {
        document.getElementById('hint').textContent = '복사되었습니다!';
      });
    }
  </script>
</body>
</html>
